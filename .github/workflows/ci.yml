name: Uniswap V2 Monorepo CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: v2-core
            workspace: "@uniswap/v2-core"
          - project: v2-periphery
            workspace: "@uniswap/v2-periphery"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"

      - name: Setup Python 3.10 for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python
        run: npx -y yarn@1.22.22 install --frozen-lockfile

      - name: Compile core artifacts for periphery tests
        if: matrix.project == 'v2-periphery'
        run: npx -y yarn@1.22.22 workspace @uniswap/v2-core run compile

      - name: Compile contracts
        run: npx -y yarn@1.22.22 workspace ${{ matrix.workspace }} run compile

      - name: Run tests
        run: npx -y yarn@1.22.22 workspace ${{ matrix.workspace }} run test
